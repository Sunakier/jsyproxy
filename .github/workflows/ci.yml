name: CI, Release & Docker

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: Test & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            short_sha="${GITHUB_SHA::7}"
            version="ci-${short_sha}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          binary="jsyproxy-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w" -o "dist/${binary}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsyproxy-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/jsyproxy-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish Binary Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Package binaries and generate checksums
        shell: bash
        run: |
          mkdir -p dist/release
          shopt -s nullglob

          for dir in dist/artifacts/*; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              name=$(basename "$file")
              if [[ "$name" == *.exe ]]; then
                archive="dist/release/${name%.exe}.zip"
                (cd "$(dirname "$file")" && zip -q -j "$(realpath "$archive")" "$name")
              else
                archive="dist/release/${name}.tar.gz"
                tar -czf "$archive" -C "$(dirname "$file")" "$name"
              fi
            done
          done

          (cd dist/release && sha256sum * > checksums.txt)

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true

  docker:
    name: Build & Push Docker Image
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          pattern: jsyproxy-*-linux-amd64
          path: dist/linux/amd64
          merge-multiple: true

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          pattern: jsyproxy-*-linux-arm64
          path: dist/linux/arm64
          merge-multiple: true

      - name: Prepare binaries for Docker build
        shell: bash
        run: |
          # Rename to fixed name so Dockerfile can COPY without version in path
          mv dist/linux/amd64/jsyproxy-*-linux-amd64 dist/linux/amd64/jsyproxy
          mv dist/linux/arm64/jsyproxy-*-linux-arm64 dist/linux/arm64/jsyproxy
          chmod +x dist/linux/amd64/jsyproxy dist/linux/arm64/jsyproxy

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=ci-,format=short,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
